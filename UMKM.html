<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMKM Mart - Katalog Produk</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #03000e;
            color: #eee;
        }
        :root {
            --purple: #8b5cf6;
            --purple-dark: #6d28d9;
            --black-bg: #080111;
            --card-bg: #100b1d;
        }
        .navbar {
            background: rgba(3, 0, 14, 0.95);
            backdrop-filter: blur(14px);
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3b2a5e;
            position: sticky;
            top: 0;
            z-index: 99;
        }
        .logo a {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--purple);
            text-decoration: none;
        }
        .back-home {
            color: #ccc;
            text-decoration: none;
            margin-right: 20px;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 32px 24px;
        }
        .filter-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }
        .search-box {
            flex: 1;
            background: #1a122f;
            border-radius: 60px;
            padding: 12px 20px;
            display: flex;
            gap: 12px;
            border: 1px solid #4c2d8a;
        }
        .search-box input {
            background: transparent;
            border: none;
            width: 100%;
            color: white;
            outline: none;
        }
        .product-grid-detail {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }
        .product-card {
            background: var(--card-bg);
            border-radius: 28px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid #312456;
            transition: 0.2s;
        }
        .product-card:hover { transform: translateY(-5px); border-color: var(--purple); }
        .product-img { height: 200px; overflow: hidden; }
        .product-img img { width: 100%; height: 100%; object-fit: cover; }
        .product-info { padding: 20px; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #120c25;
            max-width: 500px;
            width: 90%;
            border-radius: 40px;
            padding: 28px;
            border: 1px solid var(--purple);
        }
        .qty-select {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            align-items: center;
        }
        .qty-btn {
            background: #2d1f55;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .btn-buy {
            background: linear-gradient(95deg, #8b5cf6, #a855f7);
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        @media (max-width: 640px) { .container { padding: 20px; } }
    </style>
</head>
<body>

<div class="navbar">
    <div style="display: flex; align-items: center; gap: 20px;">
        <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Beranda</a>
        <div class="logo"><a href="index.html">🛍️ UMKM Mart</a></div>
    </div>
    <div><i class="fas fa-shopping-cart" id="cartIconTop" style="font-size: 1.4rem; cursor: pointer;"></i> <span id="topCartCount">0</span></div>
</div>

<div class="container">
    <div class="filter-bar">
        <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Cari produk UMKM..."></div>
        <button id="resetFilter" class="btn-outline" style="background:#1f173b; padding:0 20px; border-radius:40px;">Reset</button>
    </div>
    <div class="product-grid-detail" id="allProductsGrid"></div>
</div>

<!-- Modal Detail -->
<div id="detailModal" class="modal">
    <div class="modal-content" id="modalInner"></div>
</div>

<script>
    const products = [
        { id: 1, name: "Pisang tanta heni", price: 18000, seller: "Rumah Snack Manado", image: "https://picsum.photos/id/100/400/300", category: "makanan", desc: "Keripik singkong renyah, rasa gurih original" },
        { id: 2, name: "indomie perta", price: 450000, seller: "Batik Cirebon Asli", image: "https://picsum.photos/id/30/400/300", category: "fashion", desc: "Motif mega mendung, kain berkualitas" },
        { id: 3, name: "Kopi itang fasor", price: 95000, seller: "Kopi Nusantara", image: "https://picsum.photos/id/42/400/300", category: "minuman", desc: "Kopi bubuk asli gayo, aroma khas" },
        { id: 4, name: "Ayam puput", price: 125000, seller: "Kria Lokal", image: "https://picsum.photos/id/85/400/300", category: "kerajinan", desc: "Tas anyaman berkualitas ekspor" },
        { id: 5, name: "Ayam geprek wongjowo", price: 28000, seller: "Dapur Nusantara", image: "https://picsum.photos/id/127/400/300", category: "makanan", desc: "Pedas mantap, homemade" },
        { id: 6, name: "Bakso Mas Ateng", price: 99000, seller: "Distro Lokal", image: "https://picsum.photos/id/2<PASSWORD>/4<PASSWORD>", category: "fashion", desc: "Bahan katun, motif batik modern" },
        { id: 7, name: "Gantungan Kunci Kayu", price: 15000, seller: "Kreasi Jati", image: "https://picsum.photos/id/96/400/300", category: "kerajinan", desc: "Ukiran kayu jati, unik" }
    ];

    let currentCart = JSON.parse(localStorage.getItem('umkmCart')) || [];

    function saveCart() { localStorage.setItem('umkmCart', JSON.stringify(currentCart)); updateCartCount(); }
    function updateCartCount() { const total = currentCart.reduce((s,i)=> s+i.qty,0); document.getElementById('topCartCount').innerText = total; }

    function renderProducts(filterText = "", categoryFilter = "") {
        const selectedId = localStorage.getItem('selectedProductId');
        let filtered = products;
        if (filterText) filtered = filtered.filter(p => p.name.toLowerCase().includes(filterText.toLowerCase()));
        const catFromStorage = localStorage.getItem('selectedCategory');
        if (catFromStorage && catFromStorage !== "null") {
            filtered = filtered.filter(p => p.category === catFromStorage);
            localStorage.removeItem('selectedCategory');
        }
        if (categoryFilter) filtered = filtered.filter(p => p.category === categoryFilter);
        const grid = document.getElementById('allProductsGrid');
        grid.innerHTML = filtered.map(p => `
            <div class="product-card" onclick='openDetail(${JSON.stringify(p).replace(/'/g, "&#39;")})'>
                <div class="product-img"><img src="${p.image}" onerror="this.src='https://picsum.photos/id/26/400/300'" alt="${p.name}"></div>
                <div class="product-info"><div class="product-title">${p.name}</div><div class="product-price">Rp ${p.price.toLocaleString('id-ID')}</div><div class="product-seller"><i class="fas fa-store"></i> ${p.seller}</div></div>
            </div>
        `).join('');
        if (selectedId && !filterText) {
            const prod = products.find(p => p.id == selectedId);
            if(prod) { openDetail(prod); localStorage.removeItem('selectedProductId'); }
        }
    }

    let currentProduct = null;
    function openDetail(product) {
        currentProduct = product;
        let qty = 1;
        const modal = document.getElementById('detailModal');
        const modalInner = document.getElementById('modalInner');
        const renderModal = () => {
            modalInner.innerHTML = `
                <div style="text-align:center;"><img src="${product.image}" style="width:100%; border-radius:24px; max-height:220px; object-fit:cover;" onerror="this.src='https://picsum.photos/id/26/400/300'"></div>
                <h2 style="margin:20px 0 8px">${product.name}</h2>
                <p>${product.desc}</p>
                <p style="font-size:1.8rem; color:#a78bfa; font-weight:bold;">Rp ${product.price.toLocaleString('id-ID')}</p>
                <p><i class="fas fa-store"></i> ${product.seller}</p>
                <div class="qty-select">
                    <button class="qty-btn" id="minusQty">-</button>
                    <span id="qtyValue" style="font-size:1.5rem; min-width:50px; text-align:center;">${qty}</span>
                    <button class="qty-btn" id="plusQty">+</button>
                </div>
                <button class="btn-buy" id="addToCartDetail"><i class="fas fa-cart-plus"></i> Tambah ke Keranjang</button>
                <button class="btn-buy" id="buyNowDetail" style="margin-top:10px; background:#a855f7;"><i class="fas fa-bolt"></i> Beli Sekarang</button>
                <button class="qty-btn" id="closeModalBtn" style="margin-top:15px; width:100%;">Tutup</button>
            `;
            document.getElementById('minusQty')?.addEventListener('click', () => { if(qty>1) qty--; document.getElementById('qtyValue').innerText = qty; });
            document.getElementById('plusQty')?.addEventListener('click', () => { qty++; document.getElementById('qtyValue').innerText = qty; });
            document.getElementById('addToCartDetail')?.addEventListener('click', () => {
                const existing = currentCart.find(i => i.id === product.id);
                if(existing) existing.qty += qty;
                else currentCart.push({ id: product.id, name: product.name, price: product.price, qty: qty, image: product.image });
                saveCart();
                alert(`${product.name} (${qty}) ditambahkan ke keranjang!`);
                modal.style.display = 'none';
            });
            document.getElementById('buyNowDetail')?.addEventListener('click', () => {
                const existing = currentCart.find(i => i.id === product.id);
                if(existing) existing.qty += qty;
                else currentCart.push({ id: product.id, name: product.name, price: product.price, qty: qty, image: product.image });
                saveCart();
                window.location.href = 'pembayaran.html';
            });
            document.getElementById('closeModalBtn')?.addEventListener('click', () => modal.style.display = 'none');
        };
        renderModal();
        modal.style.display = 'flex';
    }

    document.getElementById('searchInput')?.addEventListener('input', (e) => renderProducts(e.target.value));
    document.getElementById('resetFilter')?.addEventListener('click', () => { document.getElementById('searchInput').value = ''; renderProducts(); });
    document.getElementById('cartIconTop')?.addEventListener('click', () => window.location.href = 'pembayaran.html');
    window.onclick = (e) => { if(e.target === document.getElementById('detailModal')) document.getElementById('detailModal').style.display = 'none'; };
    renderProducts();
    updateCartCount();
</script>
</body>
</html>
